<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="img/icon.jpg">
    <title>Calculator</title>
</head>
<body>
    <div class="container">
        <div class="calc">
            <form>
                <div class="screen">
                    <input type="text" name="screen">
                </div>
                
                <div>
                    <input type="button" value="AC" class="grey" onclick="screen.value =''">
                    <input type="button" value="De" class="grey" onclick="screen.value = screen.value.toString().slice(0,-1)">
                    <input type="button" value="%" class="grey" onclick="screen.value +='%'">
                    <input type="button" value="/" class="orange" onclick="screen.value +='/'">
                </div>
                <!-- END row 1 -->
               <div>
                    <input type="button" value="7" onclick="screen.value +='7'">
                    <input type="button" value="8" onclick="screen.value +='8'">
                    <input type="button" value="9" onclick="screen.value +='9'">
                    <input type="button" value="*" class="orange" onclick="screen.value +='*'">
                </div>
                 <!-- end row 2 -->
                  <div>
                    <input type="button" value="4" onclick="screen.value +='4'">
                    <input type="button" value="5" onclick="screen.value +='5'">
                    <input type="button" value="6" onclick="screen.value +='6'">
                    <input type="button" value="-" class="orange" onclick="screen.value +='-'">
                </div>
                <!-- end of row 3 -->
                 <div>
                    <input type="button" value="1" onclick="screen.value +='1'">
                    <input type="button" value="2" onclick="screen.value +='2'">
                    <input type="button" value="3" onclick="screen.value +='3'">
                    <input type="button" value="+" class="orange" onclick="screen.value +='+'">
                </div>
                    <!-- end of row 4 -->
                    <div>
                    <input type="button" value="0" class="zero" onclick="screen.value +='0'">
                    <input type="button" value="." onclick="screen.value +='.'">
                    <input type="button" value="=" class="orange" onclick="screen.value =eval(screen.value)">
                </div>
                <!-- end of raw5 -->

              
            </form>
        </div>
    </div>
</body>
</html>
